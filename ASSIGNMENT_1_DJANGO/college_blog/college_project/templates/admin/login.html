{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}

<style>

body{
background:linear-gradient(135deg,#dbeafe,#f0f9ff);
font-family:Poppins, sans-serif;
}

.login-container{
width:350px;
margin:80px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.login-container h1{
color:#1e3a8a;
margin-bottom:25px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #cbd5e1;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

<div class="login-container">

<h1>🎓 Admin Login</h1>

<form method="post">
{% csrf_token %}

{{ form.username.label_tag }}
{{ form.username }}

{{ form.password.label_tag }}
{{ form.password }}

<button type="submit">Login</button>

</form>

</div>

{% endblock %}
