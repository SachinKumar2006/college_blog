<!DOCTYPE html>
<html>
<head>
<title>Student Detail</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(to right,#dbeafe,#e0f7fa);
margin:40px;
}

/* Heading */
h1{
color:#1e3a8a;
margin-bottom:25px;
}

/* Student box */
.box{
border:1px solid #90caf9;
padding:25px;
width:50%;
background-color:#e3f2fd;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
transition:0.3s;
}

/* Hover effect */
.box:hover{
transform:scale(1.02);
}

/* Divider */
.divider{
height:1px;
background:#bbdefb;
margin:15px 0;
}

/* Paragraph */
p{
margin:10px 0;
font-size:16px;
}

strong{
color:#0d47a1;
}

/* Button */
a{
display:inline-block;
margin-top:15px;
padding:8px 14px;
background-color:#1976d2;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
transition:0.3s;
}

a:hover{
background-color:#0d47a1;
}

</style>

</head>

<body>

<h1>🎓 Student Detail</h1>

<div class="box">

<p>👤 <strong>Name:</strong> {{ student.name }}</p>

<p>🎂 <strong>Age:</strong> {{ student.age }}</p>

<p>🆔 <strong>Roll Number:</strong> {{ student.roll_number }}</p>

<p>🏫 <strong>Department:</strong> {{ student.department.dept_name }}</p>

<p>📅 <strong>Created On:</strong> {{ student.created }}</p>

<div style="margin-top:20px;">

<a href="/students/" class="back-btn">👨‍🎓 Back to Student List</a>

<a href="/" class="back-btn" style="
margin-left:10px;
background:#64748b;">
⬅ Back to Blog
</a>

</div>

</body>
</html>
